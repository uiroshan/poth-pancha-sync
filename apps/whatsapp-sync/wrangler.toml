name = "whatsapp-sync"
main = "src/index.ts"
compatibility_date = "2024-04-03"

[[queues.consumers]]
queue = "order-sync-queue"
max_batch_size = 10
max_batch_timeout = 5

[observability]
enabled = true
head_sampling_rate = 1

[env.staging]
name = "whatsapp-sync-staging"
workers_dev = true

[[env.staging.queues.consumers]]
queue = "staging-order-sync-queue"
max_concurrency = 1