name = "dispatcher"
main = "src/index.ts"
compatibility_date = "2024-04-03"

[triggers]
crons = ["0 * * * *"]

[[queues.producers]]
queue = "search-sync-queue"
binding = "SEARCH_SYNC"

# [[queues.producers]]
# queue = "media-sync-queue"
# binding = "MEDIA_SYNC"

# [[queues.producers]]
# queue = "ai-sync-queue"
# binding = "AI_SYNC"

[vars]
# Placeholder for the WooCommerce Webhook Secret
# Set the actual value using: npx wrangler secret put WEBHOOK_SECRET
# WEBHOOK_SECRET = "placeholder-secret-change-me"
WOO_URL = "https://wp.pothpancha.lk"

[observability]
enabled = true
head_sampling_rate = 1

# Add this under your producers
[[queues.producers]]
queue = "woo-fetch-queue"
binding = "WOO_FETCH_QUEUE"

# Add this to consume the fetch events internally
[[queues.consumers]]
queue = "woo-fetch-queue"
max_concurrency = 1

[[kv_namespaces]]
binding = "SYNC_STATE"
id = "88fbb7f6ad63406a936254bc5e6d464b"

